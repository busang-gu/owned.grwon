<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owned.Grown | SNS Marketing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+KR:wght@200;300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .intro-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f0e8;
            overflow: hidden;
        }

        /* 배경 큰 로고 */
        .bg-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            animation: slowDrift 20s ease-in-out infinite alternate;
        }

        .bg-icons svg {
            width: 320px;
            height: 320px;
        }

        .bg-icons svg.bg-insta {
            color: rgba(225, 48, 108, 0.08);
        }

        .bg-icons svg.bg-threads {
            color: rgba(0, 0, 0, 0.05);
        }

        @keyframes slowDrift {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(1deg); }
            100% { transform: scale(1) rotate(-1deg); }
        }

        /* 은은한 그라디언트 오버레이 */
        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background:
                radial-gradient(ellipse at 25% 40%, rgba(225, 48, 108, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 35% 60%, rgba(252, 175, 69, 0.05) 0%, transparent 40%),
                radial-gradient(ellipse at 75% 40%, rgba(0, 0, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(245,240,232,0.3) 0%, rgba(245,240,232,0.7) 100%);
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* SNS 아이콘 영역 */
        .sns-icons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards;
            animation-delay: 0.2s;
        }

        .sns-icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(0,0,0,0.03);
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .sns-icon-link:hover {
            border-color: rgba(129, 140, 248, 0.4);
            background: rgba(129, 140, 248, 0.08);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.15);
        }

        .sns-icon-link svg {
            width: 22px;
            height: 22px;
            color: rgba(0,0,0,0.4);
            transition: color 0.3s;
        }

        .sns-icon-link:hover svg {
            color: #818cf8;
        }

        .sns-divider {
            width: 1px;
            height: 20px;
            background: rgba(0,0,0,0.1);
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 400;
            color: #1a1a1a;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards;
            animation-delay: 0.5s;
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 500;
            color: rgba(30, 30, 30, 0.6);
            letter-spacing: 0.2em;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards;
            animation-delay: 0.9s;
        }

        .go-in-btn {
            display: inline-block;
            padding: 16px 76px;
            border: 1px solid rgba(225, 48, 108, 0.4);
            border-radius: 50px;
            color: #1a1a1a;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transition: all 0.5s ease;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards, btnPulse 3s ease-in-out infinite;
            animation-delay: 1.3s, 2.7s;
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.15), rgba(131, 58, 180, 0.15));
            backdrop-filter: blur(6px);
            box-shadow: 0 0 20px rgba(225, 48, 108, 0.1), 0 0 40px rgba(131, 58, 180, 0.05);
        }

        .go-in-btn:hover {
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.3), rgba(131, 58, 180, 0.3));
            border-color: rgba(225, 48, 108, 0.6);
            color: #1a1a1a;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(225, 48, 108, 0.25), 0 0 60px rgba(131, 58, 180, 0.15);
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(225, 48, 108, 0.1), 0 0 40px rgba(131, 58, 180, 0.05); }
            50% { box-shadow: 0 0 30px rgba(225, 48, 108, 0.2), 0 0 60px rgba(131, 58, 180, 0.12); }
        }

        .follower-info {
            margin-top: 32px;
            font-size: 0.68rem;
            color: rgba(30,30,30,0.35);
            letter-spacing: 0.12em;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards;
            animation-delay: 1.7s;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards, floatUpDown 2.5s ease-in-out infinite;
            animation-delay: 2.2s, 3.6s;
        }

        .scroll-hint span {
            display: block;
            width: 1px;
            height: 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.15), transparent);
            margin: 0 auto;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 1.9rem;
            }
            .subtitle {
                font-size: 0.7rem;
                padding: 0 30px;
            }
            .go-in-btn {
                padding: 12px 55px;
                font-size: 0.7rem;
            }
            .bg-icons svg {
                width: 200px;
                height: 200px;
            }
            .bg-icons {
                gap: 40px;
            }
            .sns-icon-link {
                width: 42px;
                height: 42px;
            }
            .sns-icon-link svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>

    </div>
</body>
</html>
